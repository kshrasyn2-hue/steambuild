<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1e1208"/>
  <rect x="20" y="20" width="472" height="472" rx="76" fill="none" stroke="#c9942a" stroke-width="12"/>
  <!-- 外側の歯車リング -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#7a5520" stroke-width="6"/>
  <circle cx="256" cy="256" r="130" fill="#2a1a0e"/>
  <!-- 歯車の歯 (12本) -->
  <g fill="#c9942a">
    <rect x="248" y="60" width="16" height="40" rx="4"/>
    <rect x="248" y="412" width="16" height="40" rx="4"/>
    <rect x="60" y="248" width="40" height="16" rx="4"/>
    <rect x="412" y="248" width="40" height="16" rx="4"/>
    <rect x="133" y="89" width="16" height="40" rx="4" transform="rotate(30 141 109)"/>
    <rect x="363" y="89" width="16" height="40" rx="4" transform="rotate(-30 371 109)"/>
    <rect x="133" y="383" width="16" height="40" rx="4" transform="rotate(-30 141 403)"/>
    <rect x="363" y="383" width="16" height="40" rx="4" transform="rotate(30 371 403)"/>
    <rect x="76" y="190" width="40" height="16" rx="4" transform="rotate(60 96 198)"/>
    <rect x="396" y="190" width="40" height="16" rx="4" transform="rotate(-60 416 198)"/>
    <rect x="76" y="306" width="40" height="16" rx="4" transform="rotate(-60 96 314)"/>
    <rect x="396" y="306" width="40" height="16" rx="4" transform="rotate(60 416 314)"/>
  </g>
  <!-- 中央の「真」文字 -->
  <text x="256" y="316" font-size="160" font-family="Georgia,serif" font-weight="bold"
        text-anchor="middle" fill="#c9942a" opacity="0.95">真</text>
  <!-- 中央円 -->
  <circle cx="256" cy="256" r="20" fill="#c9942a" opacity="0.5"/>
</svg>
